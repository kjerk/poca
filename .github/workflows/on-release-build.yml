name: BUILD - Create Release Artifacts

on:
  release:
    types: [published]

env:
  ENABLE_ATTESTATION: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: ['linux', 'darwin', 'windows']
        arch: ['amd64']
    steps:
      - name: SETUP - Checkout
        uses: actions/checkout@v6

      - name: SETUP - Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: BUILD - Cross-compile ${{ matrix.os }}/${{ matrix.arch }}
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY_NAME="poca-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "${BINARY_NAME}" ./cmd/poca

      - name: DEBUG - List built artifact
        run: ls -la poca-*

      - name: PROVENANCE - Attest build artifacts
        if: env.ENABLE_ATTESTATION == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'poca-*'

      - name: DEPLOY - Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: poca-${{ matrix.os }}-${{ matrix.arch }}
          path: poca-*

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SETUP - Checkout
        uses: actions/checkout@v6

      - name: FETCH - Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: poca-*
          merge-multiple: true

      - name: BUILD - Generate SHA256 checksums
        run: sha256sum poca-* > checksums-sha256.txt

      - name: DEBUG - Show release contents
        run: |
          echo "=== Artifacts ==="
          ls -la poca-*
          echo "=== Checksums ==="
          cat checksums-sha256.txt

      - name: DEPLOY - Upload all assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" poca-* checksums-sha256.txt --clobber
