name: BUILD - Create Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: SETUP - Checkout
        uses: actions/checkout@v6

      - name: SETUP - Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: BUILD - Cross-compile ${{ matrix.os }}/${{ matrix.arch }}
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY_NAME="poca-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "${BINARY_NAME}" ./cmd/poca

      - name: BUILD - Generate SHA256 checksums
        run: sha256sum poca-* > checksums-sha256.txt

      - name: DEBUG - List built artifacts
        run: |
          echo "=== Artifacts ==="
          ls -la poca-*
          echo "=== Checksums ==="
          cat checksums-sha256.txt

      - name: PROVENANCE - Attest build artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'poca-*'

      - name: DEPLOY - Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" poca-* checksums-sha256.txt --clobber
