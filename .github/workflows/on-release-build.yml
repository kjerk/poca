name: BUILD - Create Release Artifacts

on:
  release:
    types: [published]

env:
  ENABLE_ATTESTATION: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: ['linux', 'darwin', 'windows']
        arch: ['amd64']
    outputs:
      ${{ matrix.os }}_${{ matrix.arch }}_checksums: ${{ steps.checksum.outputs.checksums }}
    steps:
      - name: SETUP - Checkout
        uses: actions/checkout@v6

      - name: SETUP - Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: BUILD - Cross-compile ${{ matrix.os }}/${{ matrix.arch }}
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY_NAME="poca-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "${BINARY_NAME}" ./cmd/poca

      - name: BUILD - Generate SHA256 checksums
        id: checksum
        run: echo "checksums=$(sha256sum poca-* | tr '\n' '|')" >> $GITHUB_OUTPUT

      - name: DEBUG - List built artifact
        run: |
          echo "=== Artifact ==="
          ls -la poca-*
          echo "=== Checksum ==="
          echo "${{ steps.checksum.outputs.checksums }}" | tr '|' '\n'

      - name: PROVENANCE - Attest build artifacts
        if: env.ENABLE_ATTESTATION == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'poca-*'

      - name: DEPLOY - Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" poca-* --clobber

  checksums:
    name: Publish checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SETUP - Checkout
        uses: actions/checkout@v6

      - name: BUILD - Assemble checksum file
        uses: actions/github-script@v8
        with:
          script: |
            const outputs = ${{ toJSON(needs.build.outputs) }};
            const lines = Object.values(outputs)
              .filter(v => v)
              .map(v => v.replace(/\|/g, '\n').trim())
              .join('\n');
            require('fs').writeFileSync('checksums-sha256.txt', lines + '\n');

      - name: DEBUG - Show checksums
        run: cat checksums-sha256.txt

      - name: DEPLOY - Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" checksums-sha256.txt --clobber
