name: CHECK - Push Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Build & Check
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: SETUP - Checkout
        uses: actions/checkout@v4

      - name: SETUP - Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: BUILD - Compile binary
        run: go build ./cmd/poca

      - name: CHECK - Vet
        run: go vet ./...

      - name: CHECK - Test
        run: go test ./...

      - name: CHECK - Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
